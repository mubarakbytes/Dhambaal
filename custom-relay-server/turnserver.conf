# =======================================================================
# Dhambaal Custom Relay Server Configuration (Coturn)
# =======================================================================

# 1. The public IP address of your DigitalOcean/AWS server
# CHANGE THIS TO YOUR ACTUAL SERVER IP!
external-ip=YOUR_SERVER_PUBLIC_IP

# 2. Ports (Standard TURN ports)
listening-port=3478
tls-listening-port=5349

# 3. Static Credentials
# Users will put these exact credentials inside the Dhambaal app!
user=dhambaal_user:dhambaal_secure_password_123

# 4. Realm (Can be any name, usually your domain)
realm=dhambaal.local

# 5. Security & Performance
lt-cred-mech
fingerprint
no-cli
no-loopback-peers
no-multicast-peers

# 6. Logging
log-file=/var/log/turnserver.log
simple-log
